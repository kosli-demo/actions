name: Secure docker build

on:
  workflow_call:
    outputs:
      digest:
        description: The SHA256 image digest
        value: ${{ jobs.secure-build.outputs.digest }}
      tagged_image_name:
        description: "eg ghcr.io/kosli-demo/golden-ledger:52ec808"
        value: ${{ jobs.secure-build.outputs.tagged_image_name }}

    inputs:
      # inputs for actions/checkout@v6
      checkout_repository:
        required: true
        type: string        # eg kosli-demo/golden-ledger
      checkout_ref:
        required: true
        type: string        # eg ${{ github.sha }}
      checkout_fetch_depth:
        required: true
        type: string        # eg 1

      # inputs for docker/build-push-action@v7
      image_name:
        required: true
        type: string        # eg ghcr.io/kosli-demo/golden-ledger
      image_tag:
        required: true
        type: string        # eg 52ec808
      image_build_args:
        required: false
        type: string

      # inputs for Kosli CLI commands
      kosli_host:
        required: true
        type: string        # eg ${{ vars.KOSLI_HOST }}
      kosli_flow:
        required: true
        type: string        # eg ${{ vars.KOSLI_FLOW }}
      kosli_trail:
        required: true
        type: string        # eg ${{ vars.KOSLI_TRAIL }}
      kosli_reference_name:
        required: true
        type: string        # eg artifact

      attest_to_kosli:
        required: false
        type: boolean       # eg ${{ github.ref == 'refs/heads/main' }}
        default: true
      kosli_org:
        required: false
        type: string
        default: ${{ vars.KOSLI_ORG }}
      kosli_cli_version:
        required: false
        type: string
        default: ${{ vars.KOSLI_CLI_VERSION }}
      kosli_debug:
        required: false
        type: string
        default: ${{ vars.KOSLI_DEBUG }}
      kosli_dry_run:
        required: false
        type: string
        default: ${{ vars.KOSLI_DRY_RUN }}

    secrets:
      kosli_api_token:
        required: true


env:
  KOSLI_API_TOKEN: ${{ secrets.kosli_api_token }}
  KOSLI_DEBUG:     ${{ inputs.kosli_debug }}          # true/false
  KOSLI_DRY_RUN:   ${{ inputs.kosli_dry_run }}        # true/false
  KOSLI_HOST:      ${{ inputs.kosli_host }}           # https://app.kosli.com
  KOSLI_ORG:       ${{ inputs.kosli_org }}            # kosli-demo
  KOSLI_FLOW:      ${{ inputs.kosli_flow }}           # eg current-yield
  KOSLI_TRAIL:     ${{ inputs.kosli_trail }}

jobs:

  # Gate the build on this repo's own rego policy tests. Runs before secure-build
  # (which needs: it), so a broken policy fails here before any image is built or
  # pushed. The tests need jq (preinstalled) and the kosli CLI; they call
  # `kosli evaluate input`, which makes no API calls, so no token is required.
  test-policies:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout actions
        uses: actions/checkout@v6
        with:
          repository: kosli-demo/actions
          ref: main

      - name: Setup Kosli CLI
        uses: kosli-dev/setup-cli-action@v5
        with:
          version: ${{ inputs.kosli_cli_version }}

      - name: Run rego policy tests
        shell: bash
        run: make test-provenance test-sbom

  secure-build:
    needs: test-policies
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.sanitize-digest.outputs.digest }}
      tagged_image_name: ${{ inputs.image_name }}:${{ inputs.image_tag }}
    permissions:
      id-token: write
      contents: write
      attestations: write
      artifact-metadata: write
      packages: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - uses: actions/checkout@v6
        with:
          repository: ${{ inputs.checkout_repository }}
          ref: ${{ inputs.checkout_ref }}
          fetch-depth: ${{ inputs.checkout_fetch_depth }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image to Registry
        id: docker_build
        uses: docker/build-push-action@v7
        with:
          context: .
          no-cache: true
          push: true
          tags: |
            ${{ inputs.image_name }}:${{ inputs.image_tag }}
            ${{ inputs.image_name }}:latest
          build-args: ${{ inputs.image_build_args }}
          provenance: mode=max
          sbom: true

      # This variant attests the REAL docker image digest to Kosli - the same
      # value used as the GitHub SLSA subject-digest by the composite below. The
      # kosli-demo Org does not deploy its images to a real runtime; its
      # environment is faked from snapshot reports. Attesting the real image
      # digest lets those fake snapshots report real, content-addressable
      # digests that match each artifact's provenance.
      - name: Sanitize digest
        id: sanitize-digest
        run: |
          DIGEST=$(echo ${{ steps.docker_build.outputs.digest }} | sed 's/^sha256://')
          echo "DIGEST=${DIGEST}" >> ${GITHUB_ENV}
          echo "digest=${DIGEST}" >> ${GITHUB_OUTPUT}

      # Read the SBOM back out of the registry. Retried with backoff: the ghcr
      # blob read occasionally fails with a connection reset, and a single flake
      # should not fail the whole build. Fails the step if every attempt fails.
      - name: Get SBOM file
        shell: bash
        run: |
          for attempt in 1 2 3; do
            if docker buildx imagetools inspect ${{ inputs.image_name }}@${{ steps.docker_build.outputs.digest }} \
                 --format "{{ json .SBOM.SPDX }}" > sbom.spdx.json; then
              exit 0
            fi
            echo "imagetools inspect failed (attempt ${attempt}/3); retrying..." >&2
            sleep $((attempt * 5))
          done
          echo "imagetools inspect failed after 3 attempts" >&2
          exit 1

      # Attest the image and SBOM to GitHub and Kosli, distill provenance and
      # SBOM facts, evaluate them against SDLC-CTRL-0002 and SDLC-CTRL-0004, and
      # attest the two decisions. Reads sbom.spdx.json, ${{ env.DIGEST }} and the
      # KOSLI_* env vars set above.
      - name: Attest and evaluate
        if: ${{ success() || failure() }}
        uses: kosli-demo/actions/.github/actions/attest-and-evaluate@main
        with:
          image_name: ${{ inputs.image_name }}
          image_tag: ${{ inputs.image_tag }}
          kosli_reference_name: ${{ inputs.kosli_reference_name }}
          digest: ${{ env.DIGEST }}
          attest_to_kosli: ${{ inputs.attest_to_kosli }}
          kosli_cli_version: ${{ inputs.kosli_cli_version }}
